# =============================================================================
#  SSL/TLS Parameters Snippet (Modern Profile)
# -----------------------------------------------------------------------------
#  사용처: 443 listen 하는 server 블록에서 `include /etc/nginx/snippets/ssl_params.conf;`
#
#  근거: Mozilla SSL Configuration Generator "Modern" (TLS 1.3) + 호환을 위한 1.2 유지
#        https://ssl-config.mozilla.org/
#
#  주의:
#    - ssl_certificate / ssl_certificate_key 는 server 블록에서 별도 지정.
#    - 첫 배포 전 `/etc/letsencrypt/live/<도메인>/` 가 호스트에 준비되어 있어야 함.
#    - 미준비 시 nginx 가 기동 실패 → infra/scripts/bootstrap_host.sh 에서
#      certbot 으로 사전 발급 필수.
# =============================================================================

# ─── 프로토콜 / 암호 스위트 ───────────────────────────────────────────────
# TLS 1.0/1.1 은 deprecated, 명시적으로 제외.
ssl_protocols              TLSv1.2 TLSv1.3;
# TLS 1.3 은 클라이언트 cipher 우선, 1.2 는 강력한 cipher 만 허용.
ssl_prefer_server_ciphers  off;
ssl_ciphers
    ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

# Diffie-Hellman 매개변수 (DHE 지원).
# 미생성 시 본 줄을 주석 처리하거나, 다음 명령으로 생성:
#   openssl dhparam -out /etc/letsencrypt/ssl-dhparams.pem 2048
ssl_dhparam                /etc/letsencrypt/ssl-dhparams.pem;


# ─── 세션 캐시 / 티켓 ─────────────────────────────────────────────────────
# 세션 재사용으로 핸드셰이크 비용 절감 (멀티 워커 공유).
ssl_session_cache          shared:SSL:10m;
ssl_session_timeout        1d;
# 세션 티켓은 forward secrecy 약화 우려가 있어 off 권장.
ssl_session_tickets        off;


# ─── OCSP Stapling ────────────────────────────────────────────────────────
# 클라이언트가 OCSP 서버에 직접 묻지 않도록 nginx 가 응답을 stapling.
ssl_stapling               on;
ssl_stapling_verify        on;
# ssl_trusted_certificate 는 server 블록에서 chain.pem 으로 지정 권장:
#   ssl_trusted_certificate /etc/letsencrypt/live/<도메인>/chain.pem;


# ─── 버퍼 ─────────────────────────────────────────────────────────────────
# 작게 유지하면 첫 바이트 latency ↓ (TLS False Start 효과).
ssl_buffer_size            4k;


# ─── ECDH 곡선 ────────────────────────────────────────────────────────────
ssl_ecdh_curve             X25519:secp384r1:secp256r1;


# ─── Early Data (TLS 1.3 0-RTT) ───────────────────────────────────────────
# 보안상 GET (idempotent) 만 0-RTT 권장 → 기본 off.
# 활성화 시 별도 검토 필요.
# ssl_early_data           off;