# =============================================================================
#  Proxy Common Headers Snippet
# -----------------------------------------------------------------------------
#  사용처: server 블록의 location 에서 `include /etc/nginx/snippets/proxy_params.conf;`
#
#  목적: 헤더 전용 — Django 가 클라이언트의 실제 IP / 프로토콜을 알도록.
#  주의: proxy_http_version / proxy_buffer_size 같은 비-헤더 directive 들은
#        nginx.conf 의 http {} 블록에서 전역 default 로 설정 (location 마다
#        include 시 duplicate 되지 않도록).
# =============================================================================

proxy_set_header Host                $host;
proxy_set_header X-Real-IP           $remote_addr;
proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto   $scheme;
proxy_set_header X-Forwarded-Host    $host;
proxy_set_header X-Forwarded-Port    $server_port;
proxy_set_header X-Forwarded-Server  $host;
proxy_redirect   off;
