# =============================================================================
#  Security Headers Snippet
# -----------------------------------------------------------------------------
#  사용처: 443 server 블록에서 `include /etc/nginx/snippets/security_headers.conf;`
#
#  설계 근거: vmd_infra_plan.md §3.3 + OWASP Secure Headers Project
# =============================================================================

# ─── 클릭재킹 방지 (iframe 임베드 차단) ────────────────────────────────────
add_header X-Frame-Options          "SAMEORIGIN" always;

# ─── MIME 스니핑 방지 ─────────────────────────────────────────────────────
add_header X-Content-Type-Options   "nosniff" always;

# ─── Referer 정책 (cross-origin 시 origin 만 노출) ────────────────────────
add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

# ─── HSTS — HTTPS 강제 (1년 + subdomains) ─────────────────────────────────
# preload 추가 시 hstspreload.org 에 등록 필요. 등록 후 제거 어려우니 신중히.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# ─── Permissions Policy (불필요한 브라우저 기능 차단) ─────────────────────
add_header Permissions-Policy
    "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=()"
    always;

# ─── Cross-Origin 격리 (선택) ─────────────────────────────────────────────
# Three.js 의 ImageBitmap / SharedArrayBuffer 사용 시 필요할 수 있음.
# 도입 전 외부 임베드(YouTube / Google Maps 등) 영향 검증 필수.
# add_header Cross-Origin-Opener-Policy   "same-origin"     always;
# add_header Cross-Origin-Embedder-Policy "require-corp"    always;


# ─── Content Security Policy ──────────────────────────────────────────────
# Three.js + WebGL + Vite 정적 자산 + CDN(에셋) + WebSocket 모두 허용.
# 운영 도메인이 변경되면 cdn.do-goproject.com 부분 동기 업데이트 필요.
#
# ⚠️ 한 줄로 작성하는 이유:
#   nginx 의 add_header 는 quoted string 안의 `\\` + 줄바꿈을 line continuation 으로
#   해석하지 않음 → 응답 헤더 value 에 그대로 줄바꿈/공백이 박혀 HTTP/2 가 reject
#   ("Invalid HTTP header field" / curl exit 92). HTTP/2 spec(RFC 9113) 은
#   multi-line header(obs-fold) 를 금지함. → 무조건 한 줄.
#
# 정책 요점:
#   - default-src 'self'                : 기본 self 만 허용
#   - script-src  'wasm-unsafe-eval'    : Three.js 가 WASM 평가 필요
#   - style-src   'unsafe-inline'       : Tailwind/Vite 의 inline style 허용
#   - img-src     data: + CDN           : 데이터 URI + 에셋 CDN
#   - connect-src wss: + CDN            : WebSocket + CDN signed URL
#   - worker-src  'self' blob:          : Three.js Web Worker / OffscreenCanvas
#   - frame-ancestors 'none'            : iframe 임베드 완전 차단
#   - base-uri    'self'                : <base> 태그 변조 방지
#   - form-action 'self'                : 폼 제출 self 만
#   - object-src  'none'                : <object>/<embed> 차단
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://cdn.do-goproject.com; font-src 'self' data:; connect-src 'self' wss: https://cdn.do-goproject.com; media-src 'self' https://cdn.do-goproject.com; worker-src 'self' blob:; child-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests" always;