# =============================================================================
#  VMD Nginx — Main Global Configuration
#  설계 근거: infra/.ai/plan/vmd_infra_plan.md §3.3
#
#  역할:
#    - 전역 설정(이벤트, 압축, 로깅, rate limit zone) 정의
#    - 서버 블록은 conf.d/*.conf 로 분리하여 include
#    - upstream 정의는 conf.d/00-upstream-active.conf 의 심볼릭 링크가 결정
#      (배포 시 infra/scripts/switch_color.sh 가 blue/green 으로 교체)
# =============================================================================

user                 nginx;
worker_processes     auto;
worker_rlimit_nofile 65535;
pid                  /var/run/nginx.pid;

# graceful shutdown — Blue/Green reload 시 in-flight 요청 종료까지 대기
worker_shutdown_timeout 60s;


events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}


http {

    # ─────────────────────────────────────────────────────────────────────
    # MIME Types
    # ─────────────────────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 3D 모델 / WASM (Three.js GLBLoader 등이 정확한 MIME 으로 응답받아야 함)
    types {
        model/gltf-binary  glb;
        model/gltf+json    gltf;
    }

    # 문자 인코딩
    charset       utf-8;
    charset_types text/css text/plain application/json application/javascript
                  application/xml application/wasm;


    # ─────────────────────────────────────────────────────────────────────
    # Logging
    # ─────────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'urt="$upstream_response_time"';

    access_log  /var/log/nginx/access.log main buffer=32k flush=5s;
    error_log   /var/log/nginx/error.log warn;


    # ─────────────────────────────────────────────────────────────────────
    # Performance
    # ─────────────────────────────────────────────────────────────────────
    sendfile                    on;
    tcp_nopush                  on;
    tcp_nodelay                 on;
    keepalive_timeout           65s;
    keepalive_requests          1000;
    server_tokens               off;
    reset_timedout_connection   on;
    types_hash_max_size         4096;
    server_names_hash_bucket_size 64;



    # ─────────────────────────────────────────────────────────────────────
    # 대용량 파일 / 업로드 보호 (기본값 — 일반 라우트)
    # 관리자 업로드는 server 블록의 location 에서 override.
    # ─────────────────────────────────────────────────────────────────────
    client_max_body_size        5m;
    client_body_buffer_size     1m;
    client_body_temp_path       /var/cache/nginx/client_temp 1 2;
    client_header_buffer_size   1k;
    large_client_header_buffers 4 8k;
    client_header_timeout       30s;
    client_body_timeout         60s;
    send_timeout                60s;


    # ─────────────────────────────────────────────────────────────────────
    # Compression
    # ─────────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_min_length   1024;
    gzip_comp_level   5;
    gzip_disable      "msie6";
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/wasm
        model/gltf+json          # gltf 텍스트 형식만 압축
        image/svg+xml
        font/ttf
        font/otf;
    # ⚠️ 주의: model/gltf-binary (GLB) 는 의도적으로 제외.
    #          이미 압축된 바이너리 형식이라 추가 gzip 은 CPU 낭비 + 무압축 결과.
    #          (vmd_infra_plan.md §3.4 트레이드오프 표 참조)


    # ─────────────────────────────────────────────────────────────────────
    # Rate Limiting Zones
    # 실제 적용은 server 블록 location 에서 limit_req / limit_conn
    # ─────────────────────────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=api_general:10m rate=30r/s;
    limit_req_zone  $binary_remote_addr zone=api_auth:10m    rate=5r/s;
    limit_req_zone  $binary_remote_addr zone=api_upload:10m  rate=2r/s;
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # rate limit 초과 시 응답 코드 (기본 503 → 명시적 429)
    limit_req_status  429;
    limit_conn_status 429;


    # ─────────────────────────────────────────────────────────────────────
    # WebSocket Upgrade Map (Channels / 진행률 푸시 등)
    # ─────────────────────────────────────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }


    # ─────────────────────────────────────────────────────────────────────
    # DNS Resolver — OCSP stapling 및 동적 업스트림 해석
    # ─────────────────────────────────────────────────────────────────────
    resolver         1.1.1.1 8.8.8.8 valid=300s ipv6=off;
    resolver_timeout 5s;


    # ─────────────────────────────────────────────────────────────────────
    # Includes
    #   - conf.d/00-upstream-active.conf  → 활성 색상의 upstream
    #     (심볼릭 링크: ../upstreams/upstream.{blue|green}.conf)
    #   - conf.d/10-server-https.conf     → 메인 HTTPS 서버 블록
    #   - conf.d/20-server-internal.conf  → (옵션) 관리자/내부 라우트
    # ─────────────────────────────────────────────────────────────────────

    # ─── proxy 전역 default (snippet 의 중복 회피) ───
    proxy_http_version       1.1;
    proxy_set_header         Connection '';
    proxy_buffer_size        8k;
    proxy_buffers            8 8k;
    proxy_busy_buffers_size  16k;
    include /etc/nginx/conf.d/*.conf;
}