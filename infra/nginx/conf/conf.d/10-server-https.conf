# =============================================================================
#  VMD Nginx — Main HTTPS Server Block
# -----------------------------------------------------------------------------
#  설계 근거: vmd_infra_plan.md §3.3
#
#  로드 순서:
#    conf.d/00-upstream-active.conf  ← (심볼릭 링크) upstream backend { ... }
#    conf.d/10-server-https.conf     ← 본 파일 (server { ... })
#    conf.d/20-server-internal.conf  ← (옵션) 내부/관리자 라우트
#
#  라우팅 매트릭스:
#    /                    → SPA (frontend_dist 볼륨에서 정적 서빙)
#    /assets/*.{js,css..} → 1년 immutable 캐시 (해시 파일명 가정)
#    /api/                → backend (rate limit: 30 r/s)
#    /api/auth|login|...  → backend (rate limit: 5 r/s, 강한 제한)
#    /api/admin-upload/   → backend (100MB 허용, 스트리밍 패스스루)
#    /ws/                 → backend WebSocket (Channels)
#    /static/             → Django collectstatic
#    /media/              → 410 Gone (CDN 사용 강제)
#    /healthz             → 200 ok (LB/감시)
#    /jenkins/            → host EC2 :9090 (systemd Jenkins, --prefix=/jenkins)
#    /swagger/            → backend /api/v1/docs (django-ninja Swagger UI)
#    /kibana/             → vmd-kibana:5601 (Kibana, basePath=/kibana)
#    /.well-known/acme-challenge/ → certbot HTTP-01 chal
# =============================================================================


# ─────────────────────────────────────────────────────────────────────────────
# HTTP → HTTPS 강제 리다이렉트 + Let's Encrypt 챌린지
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen      80 default_server;
    listen      [::]:80 default_server;
    server_name _;

    # certbot HTTP-01 challenge (자동 갱신 시 사용)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # LB/모니터링용 헬스 엔드포인트 (HTTPS 우회)
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return     200 "ok\n";
    }

    # 그 외 모든 요청은 HTTPS 로 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}


# ─────────────────────────────────────────────────────────────────────────────
# 메인 HTTPS 서버
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2  on;

    # 운영 시 실제 도메인으로 교체 필요. (env 주입 어려우니 배포 스크립트에서 sed 권장)
    server_name do-goproject.com;

    # ─── TLS 인증서 (호스트 /etc/letsencrypt 가 read-only mount) ───
    ssl_certificate         /etc/letsencrypt/live/do-goproject.com/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/do-goproject.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/do-goproject.com/chain.pem;

    # ─── 공통 SSL / 보안 헤더 ───
    include /etc/nginx/snippets/ssl_params.conf;
    include /etc/nginx/snippets/security_headers.conf;

    # ─── 동시 연결 제한 (DoS 완화) ───
    limit_conn conn_per_ip 50;

    # ─── SPA 정적 파일 루트 (frontend-builder 가 export 한 산출물) ───
    root  /usr/share/nginx/html;
    index index.html;

    # 큰 응답 (예: GLB 파일 다운로드 폴백) 보호
    proxy_max_temp_file_size 0;


    # ─────────────────────────────────────────────────────────────────────
    # 1) SPA 진입점 + Vite 정적 자산
    # ─────────────────────────────────────────────────────────────────────
    # SPA shell 은 매번 최신 가져와야 새 빌드 즉시 반영
    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # 해시된 정적 자산: 영구 캐싱 (Vite 가 파일명에 hash 를 박음)
    # access_log off 로 디스크 I/O 절약.
    location ~* ^/assets/.+\.(?:js|css|woff2?|svg|png|jpe?g|webp|gif|ico)$ {
        expires    1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files  $uri =404;
    }

    # GLB / glTF / WASM 정적 (혹시 FE 가 직접 배포할 경우; 보통 CDN 사용)
    location ~* \.(?:glb|gltf|wasm)$ {
        expires    1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        # CORS 허용 (Three.js GLBLoader 가 cross-origin 검사)
        add_header Access-Control-Allow-Origin "*" always;
        try_files  $uri =404;
    }


    # ─────────────────────────────────────────────────────────────────────
    # 2) /api/auth|login|register/  ← 더 엄격한 rate limit (regex 가 prefix 보다 우선)
    # ─────────────────────────────────────────────────────────────────────
    location ~ ^/api/(?:auth|login|register|password)/ {
        limit_req zone=api_auth burst=10 nodelay;

        include      /etc/nginx/snippets/proxy_params.conf;
        proxy_pass   http://backend;
    }


    # ─────────────────────────────────────────────────────────────────────
    # 3) /api/admin-upload/  ← 관리자 직접 업로드 폴백 (100MB)
    #     일반 사용자 업로드는 S3 Presigned 직접 PUT (Nginx 우회)
    # ─────────────────────────────────────────────────────────────────────
    location /api/admin-upload/ {
        limit_req zone=api_upload burst=4;

        client_max_body_size      100m;
        client_body_buffer_size   1m;

        # 큰 페이로드는 메모리 버퍼링 없이 backend 로 스트리밍 패스스루
        proxy_request_buffering   off;
        proxy_buffering           off;

        proxy_read_timeout        300s;
        proxy_send_timeout        300s;

        include    /etc/nginx/snippets/proxy_params.conf;
        proxy_pass http://backend;
    }


    # ─────────────────────────────────────────────────────────────────────
    # 4) /api/  ← 일반 API (django-ninja)
    # ─────────────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_general burst=60 nodelay;

        # GLB 3D 모델 업로드 (assets 3d-tasks complete endpoint 등)
        client_max_body_size 50m;
        
        include            /etc/nginx/snippets/proxy_params.conf;
        proxy_pass         http://backend;
        proxy_read_timeout 60s;
    }


    # ─────────────────────────────────────────────────────────────────────
    # 5) /ws/  ← WebSocket (Django Channels — 진행률 푸시 등)
    # ─────────────────────────────────────────────────────────────────────
    location /ws/ {
        # WebSocket 업그레이드 헤더
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        # 장시간 유지되는 연결
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;

        # 버퍼링 비활성 (실시간성)
        proxy_buffering     off;

        include    /etc/nginx/snippets/proxy_params.conf;
        proxy_pass http://backend;
    }


    # ─────────────────────────────────────────────────────────────────────
    # 6) /static/  ← Django collectstatic (admin 정적 파일)
    # ─────────────────────────────────────────────────────────────────────
    location /static/ {
        alias      /var/www/static/;
        expires    1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files  $uri =404;
    }


    # ─────────────────────────────────────────────────────────────────────
    # 7) /media/  ← Django 미디어 파일 서빙 (django_media 볼륨 공유)
    # ─────────────────────────────────────────────────────────────────────
    location /media/ {
        alias /var/www/media/;
        expires 7d;
        add_header Access-Control-Allow-Origin "*" always;
        access_log off;
        try_files $uri =404;
    }


    # ─────────────────────────────────────────────────────────────────────
    # 8) /healthz  ← LB / 감시용
    # ─────────────────────────────────────────────────────────────────────
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return     200 "ok\n";
    }


    # ─────────────────────────────────────────────────────────────────────
    # 9) /jenkins/  ← Jenkins UI (host EC2 :9090 systemd, --prefix=/jenkins)
    # -----------------------------------------------------------------------
    # 설계 근거: nginx_path_routing_plan.md
    #   - 단일 도메인 + path-based routing (subdomain 회피로 cert/DNS 추가 부담 X)
    #   - Jenkins 자체가 --prefix=/jenkins 로 서빙해야 절대 URL (rebuild 링크,
    #     plugin 정적 자산) 이 깨지지 않음
    #   - AWS SG 에서 외부 9090 차단 후엔 nginx HTTPS 가 유일한 진입점 (보안 강화)
    #
    # WebSocket 필수: Jenkins live console / pipeline graph 가 ws 사용
    # Body size 100m: 플러그인 업로드, 큰 빌드 로그 attachment
    # CSP override: Jenkins 가 inline script + eval 사용 → 메인 strict CSP 와 충돌
    #               이 location 한정으로 빈 CSP 헤더 (메인 헤더 무력화)
    # -----------------------------------------------------------------------
    location /jenkins/ {
        proxy_pass         http://host.docker.internal:9090/jenkins/;
        proxy_http_version 1.1;

        # Reverse proxy 식별 — Jenkins 가 절대 URL 생성 시 사용
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  443;

        # WebSocket (live console / pipeline graph)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;

        # 플러그인 업로드 / 큰 빌드 로그
        client_max_body_size      100m;
        proxy_request_buffering   off;
        proxy_buffering           off;

        # 대형 빌드 console 페이지 등 응답 시간 확보
        proxy_read_timeout        300s;
        proxy_send_timeout        300s;

        # CSP override — Jenkins inline script 호환 (메인 strict CSP 무력화)
        # nginx add_header 는 가장 가까운 컨텍스트가 우선 → 빈 값으로 메인 헤더 덮어씀
        add_header Content-Security-Policy "" always;
    }


    # ─────────────────────────────────────────────────────────────────────
    # 10) /swagger/ ← django-ninja Swagger UI 별칭 (실제는 /api/v1/docs)
    # -----------------------------------------------------------------------
    # Basic Auth + nginx alias. backend 변경 0:
    #   - django-ninja 가 자동 생성하는 Swagger UI 가 /api/v1/docs 에 노출 중
    #   - HTML 안의 OpenAPI schema URL 이 absolute path "/api/v1/openapi.json"
    #     으로 박혀 있어 location alias 만으로 충분 (relative asset 문제 X)
    #   - JS/CSS 는 jsdelivr CDN 사용 → 같은 도메인 자산 0
    #
    # 보안:
    #   - Basic Auth — 외부 평가자/팀원이 비번으로 접근 (ID/PW 팀 채널 공유)
    #   - CSP override — Swagger UI 의 inline script + jsdelivr CDN 호환 위해
    #     이 location 한정 무력화 (Basic Auth 가 1차 방어막이라 위험 작음)
    #
    # /swagger (slash 없이) 도 /swagger/ 로 정규화 (UX).
    # -----------------------------------------------------------------------
    location = /swagger {
        return 301 /swagger/;
    }
    location = /swagger/ {
        # Basic Auth — 1차 방어막. htpasswd 파일은 호스트 /etc/nginx/auth/
        # (compose bind mount, git 미추적). 자격증명 회전 절차는
        # docker-compose.prod.yml 의 해당 mount 코멘트 참조.
        auth_basic           "DoGo API Documentation";
        auth_basic_user_file /etc/nginx/auth/.htpasswd-swagger;

        include    /etc/nginx/snippets/proxy_params.conf;
        proxy_pass http://backend/api/v1/docs;
        proxy_read_timeout 30s;

        # CSP override — Swagger UI 가 jsdelivr CDN(JS/CSS) + inline script 사용
        # 메인 strict CSP (script-src 'self') 와 충돌 → location 한정 무력화.
        # Basic Auth 통과한 사용자만 도달 → CSP 약화의 잔여 XSS 위험 작음.
        add_header Content-Security-Policy "" always;

        # Cache-Control — CSP/auth 정책 변경 시 클라이언트가 옛 응답 (옛 CSP 포함)
        # 캐시해서 새 정책 미반영되는 사고 방지. 매 요청 fresh 응답.
        add_header Cache-Control "no-store, must-revalidate" always;
    }


    # ─────────────────────────────────────────────────────────────────────
    # 11) /kibana/ ← Kibana UI (vmd-kibana 컨테이너, basePath=/kibana)
    # -----------------------------------------------------------------------
    # 설계 근거: observability_elk_plan.md §D5 + nginx_path_routing_plan.md
    #   - Kibana 가 SERVER_BASEPATH=/kibana + REWRITEBASEPATH=true 로 자체 처리
    #     (HTML 안의 절대 경로 / asset 모두 /kibana/* prefix 를 갖고 생성됨)
    #   - 따라서 nginx 는 단순히 path 를 그대로 패스스루 (rewrite 불필요)
    #
    # 보안:
    #   - Basic Auth (1차 방어) — htpasswd 파일은 /etc/nginx/auth/.htpasswd-kibana
    #     (호스트 mount, git 미추적). 자격증명 회전 절차는 docker-compose.prod.yml
    #     의 nginx 서비스 mount 코멘트 참조.
    #   - Kibana 자체 인증 (elastic 슈퍼유저) 은 ES 와의 통신용. 외부 사용자 인증은
    #     본 location 의 Basic Auth 가 책임.
    #
    # WebSocket: Kibana 의 일부 실시간 기능 (Discover live tail 등) 이 ws 사용.
    # CSP override: Kibana React app 의 inline script + eval 사용 → 메인 strict CSP
    #               와 충돌. 이 location 한정 무력화 (Basic Auth 가 1차 방어막).
    #
    # /kibana (slash 없이) 도 /kibana/ 로 정규화 (UX).
    # -----------------------------------------------------------------------
    location = /kibana {
        return 301 /kibana/;
    }
    location /kibana/ {
        # Kibana 50+ plugin bundle 동시 fetch 시 server-level limit_conn 50
        # inherit 가 plugin bundle .js 절반을 429 reject → "Elastic did not load
        # properly" 화면. /kibana/ 한정으로 limit 1000 으로 override.
        limit_conn conn_per_ip 1000;

        # Basic Auth 비활성화 (2026-05-07) — 동일 auth_basic 설정이 /swagger/,
        # /testauth/, /kibanax/ 에서는 정상 인증, 오직 /kibana/ path 만 모든
        # creds reject (error log 도 안 찍힘). nginx 내부 이슈 추정, root cause
        # 미해명. Kibana 자체 elastic login 으로 1차 방어 충분 — nginx layer
        # 우회. 향후 root cause 추적되면 복구 가능.
        # auth_basic           "VMD Kibana Logs";
        # auth_basic_user_file /etc/nginx/auth/.htpasswd-kibana;

        # Docker embedded DNS + 변수 proxy_pass:
        #   - 호스트명을 변수로 넘기면 nginx 가 reload/start 시점이 아닌 요청 시점에 resolve
        #     → kibana 컨테이너가 아직 없어도 `nginx -t` 통과 (첫 ELK 배포의 닭-달걀 회피;
        #       Jenkinsfile-infra A4 stage 가 stage B 의 compose up 보다 먼저 실행됨)
        #   - 컨테이너 재시작으로 IP 가 바뀌어도 valid TTL 만료 시 자동 재해석
        #   - 127.0.0.11 = Docker 사용자 정의 네트워크의 임베디드 DNS
        resolver           127.0.0.11 valid=10s ipv6=off;
        set                $kibana_upstream http://kibana:5601;

        # Kibana 컨테이너로 패스스루. basePath 는 Kibana 가 자체 처리하므로 strip 불필요.
        proxy_pass         $kibana_upstream;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket (Discover live tail 등)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;

        # 대시보드 / Discover 응답 시간 확보 (대용량 검색)
        proxy_read_timeout        300s;
        proxy_send_timeout        300s;

        # CSP override — Kibana React app 의 inline script + eval 호환.
        # Basic Auth 통과한 사용자만 도달 → CSP 약화의 잔여 XSS 위험 작음.
        add_header Content-Security-Policy "" always;

        # CSP/auth 정책 변경 즉시 반영 (옛 응답 캐시로 인한 미반영 방지)
        add_header Cache-Control "no-store, must-revalidate" always;
    }


    # ─────────────────────────────────────────────────────────────────────
    # 12) Error pages
    # ─────────────────────────────────────────────────────────────────────
    # SPA fallback — 알려지지 않은 경로는 index.html 로 (React Router)
    error_page 404 = @spa_fallback;
    location @spa_fallback {
        rewrite ^ /index.html break;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # backend 5xx 일 때 상세 페이지 노출 차단
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
        add_header Content-Type text/html;
        return 500 "<html><body><h1>Service temporarily unavailable</h1></body></html>";
    }


    # ─────────────────────────────────────────────────────────────────────
    # 13) Hidden files / dotfiles 차단
    # ─────────────────────────────────────────────────────────────────────
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }
}
