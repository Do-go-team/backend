# =============================================================================
#  VMD Nginx Upstream — BLUE
# -----------------------------------------------------------------------------
#  활성 색상이 BLUE 일 때 사용되는 backend 정의.
#  conf.d/00-upstream-active.conf 가 본 파일을 가리키는 심볼릭 링크일 때 활성화.
#
#  배포 시 활성 색상 전환:
#    bash infra/scripts/switch_color.sh blue
#    → ln -sfn ../upstreams/upstream.blue.conf  conf.d/00-upstream-active.conf
#    → docker exec vmd-nginx nginx -s reload
# =============================================================================

upstream backend {
    # 단일 호스트라 알고리즘 영향 미미. 향후 확장 대비 least_conn.
    least_conn;

    # Django Blue 컨테이너 (compose service: django-blue)
    server django-blue:8000  max_fails=3  fail_timeout=10s;

    # Backend 와의 keepalive 연결 풀 (worker 당 32 idle)
    keepalive          32;
    keepalive_requests 1000;
    keepalive_timeout  60s;
}