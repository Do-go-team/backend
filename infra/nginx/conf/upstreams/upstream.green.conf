# =============================================================================
#  VMD Nginx Upstream — GREEN
# -----------------------------------------------------------------------------
#  활성 색상이 GREEN 일 때 사용되는 backend 정의.
#  conf.d/00-upstream-active.conf 가 본 파일을 가리키는 심볼릭 링크일 때 활성화.
#
#  배포 시 활성 색상 전환:
#    bash infra/scripts/switch_color.sh green
#    → ln -sfn ../upstreams/upstream.green.conf  conf.d/00-upstream-active.conf
#    → docker exec vmd-nginx nginx -s reload
# =============================================================================

upstream backend {
    least_conn;

    # Django Green 컨테이너 (compose service: django-green, profile=green)
    server django-green:8000  max_fails=3  fail_timeout=10s;

    keepalive          32;
    keepalive_requests 1000;
    keepalive_timeout  60s;
}